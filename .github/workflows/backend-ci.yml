name: Backend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'urbanwear_backend/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'urbanwear_backend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./urbanwear_backend

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B package --file pom.xml -DskipTests
